<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="The Table — World Cup 2026 fantasy leaderboard for our friend group.">
  <title>The Table — World Cup 2026</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <div class="site-title">
        <h1>⚽ The Table</h1>
        <p class="tagline">World Cup 2026 &middot; Friend Group Fantasy</p>
      </div>
      <nav class="main-nav" aria-label="Main navigation">
        <button class="nav-btn active" data-tab="leaderboard">Standings</button>
        <button class="nav-btn" data-tab="matches">Upcoming</button>
        <button class="nav-btn" data-tab="how-it-works">Scoring</button>
        <button id="refresh-btn" class="refresh-btn" title="Refresh live data" aria-label="Refresh">↻</button>
      </nav>
    </div>
  </header>

  <div id="status-bar" class="status-bar hidden" role="status" aria-live="polite"></div>

  <main class="main-content">

    <!-- Leaderboard -->
    <section id="tab-leaderboard" class="tab-panel active" aria-label="Standings">
      <div class="loading-state" id="leaderboard-loading">
        <div class="spinner" role="progressbar" aria-label="Loading standings"></div>
        <p>Loading standings&hellip;</p>
      </div>
      <div id="leaderboard-content" class="hidden"></div>
    </section>

    <!-- Upcoming Matches -->
    <section id="tab-matches" class="tab-panel" aria-label="Upcoming matches">
      <div class="loading-state" id="matches-loading">
        <div class="spinner" role="progressbar" aria-label="Loading matches"></div>
        <p>Loading matches&hellip;</p>
      </div>
      <div id="matches-content" class="hidden"></div>
    </section>

    <!-- How It Works -->
    <section id="tab-how-it-works" class="tab-panel" aria-label="Scoring rules">
      <div id="how-it-works-content"></div>
    </section>

  </main>

  <footer class="site-footer">
    <span id="last-updated"></span>
    <span>Data: <a href="https://github.com/openfootball/worldcup.json"
      target="_blank" rel="noopener noreferrer">openfootball</a></span>
  </footer>

  <script type="module" src="js/app.js"></script>
</body>
</html>
